<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fabbro — code review tool</title>
  <style>
    :root {
      --color-toolbar-bg: #1f2937;
      --color-text: #1f2937;
      --color-gutter: #9ca3af;
      --color-border: #e5e7eb;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Helvetica Neue', Arial, sans-serif;
      color: var(--color-text);
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .home {
      max-width: 480px;
      text-align: center;
      padding: 2rem;
    }

    .home h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .home .tagline {
      color: var(--color-gutter);
      font-size: 1.125rem;
      margin-bottom: 2.5rem;
    }

    .home .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .home a {
      display: block;
      padding: 0.875rem 1.5rem;
      font-size: 1.125rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      transition: opacity 0.15s;
    }

    .home a:hover {
      opacity: 0.9;
    }

    .home .primary {
      color: #ffffff;
      background: var(--color-toolbar-bg);
    }

    .home .secondary {
      color: var(--color-text);
      background: none;
      border: 1px solid var(--color-border);
    }

    .home .secondary:hover {
      background: #f9fafb;
    }
  </style>
</head>
<body>
  <div class="home">
    <h1>fabbro</h1>
    <p class="tagline">A local-first code review annotation tool</p>
    <div class="links">
      <a href="app.html" class="primary">Try it live →</a>
      <a href="docs/" class="secondary">Documentation</a>
    </div>
  </div>
</body>
</html>
